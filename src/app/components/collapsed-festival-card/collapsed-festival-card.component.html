<section class="collapsed-card">
  <button
    class="collapsed-card__summary"
    type="button"
    [attr.aria-expanded]="expanded()"
    [attr.aria-controls]="'festival-details-' + title()"
    (click)="toggled.emit()"
  >
    <span>
    <h3>{{ title() }}</h3>
    <p>{{ dateLabel() }}</p>
    </span>
    <ion-icon [name]="expanded() ? 'chevron-down' : 'chevron-forward'" aria-hidden="true"></ion-icon>
  </button>

  @if (expanded()) {
    <div class="collapsed-card__details" [id]="'festival-details-' + title()">
      <p><strong>Where:</strong> {{ location() }}</p>
      <p><strong>When:</strong> {{ dateLabel() }}</p>
      <p><strong>{{ countdownLabel() }}</strong></p>
      <p>{{ transportLabel() }}</p>
      <p>{{ accommodationLabel() }}</p>
      <div class="collapsed-card__actions">
        <ion-button class="rr-button" expand="block" (click)="viewLineup.emit()">Line up</ion-button>
        <ion-button aria-label="View festival details" expand="block" fill="outline" (click)="viewDetails.emit()">Details</ion-button>
      </div>
    </div>
  }
</section>
