<ion-card class="festival-card">
  <div class="festival-card__image">
    <app-festival-image [festivalTitle]="title()" [imageUrl]="imageUrl()"></app-festival-image>
  </div>

  <ion-card-header>
    <p class="festival-card__eyebrow">NEXT ADVENTURE</p>
    <ion-card-title>{{ title() }}</ion-card-title>
  </ion-card-header>

  <ion-card-content>
    <dl class="festival-card__details">
      <div>
        <dt>When</dt>
        <dd>{{ dateLabel() }}</dd>
      </div>
      <div>
        <dt>Where</dt>
        <dd>{{ location() }}</dd>
      </div>
    </dl>

    <p class="festival-card__countdown">{{ countdownLabel() }}</p>
    <div class="festival-card__statuses">
      <ion-chip color="primary">
        <ion-label>{{ transportLabel() }}</ion-label>
      </ion-chip>
      <ion-chip color="primary">
        <ion-label>{{ accommodationLabel() }}</ion-label>
      </ion-chip>
    </div>

    <div class="festival-card__actions">
      <ion-button class="rr-button" expand="block" (click)="viewLineup.emit()">Line up</ion-button>
      <ion-button aria-label="View festival details" expand="block" fill="outline" (click)="viewDetails.emit()">Details</ion-button>
    </div>
  </ion-card-content>
</ion-card>
