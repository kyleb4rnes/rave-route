<ion-app
  [style.--ion-color-primary]="theme().primary"
  [style.--ion-color-primary-rgb]="theme().primaryRgb"
  [style.--ion-color-primary-shade]="theme().primaryDark"
  [style.--ion-color-primary-tint]="theme().tint"
  [style.--ion-background-color]="appearance().background"
  [style.--ion-card-background]="appearance().surface"
  [style.--ion-item-background]="appearance().surface"
  [style.--ion-text-color]="appearance().text"
  [style.--rr-accent]="theme().tint"
  [style.--rr-app-background]="appBackground()"
  [style.--rr-background]="appearance().background"
  [style.--rr-surface]="appearance().surface"
  [style.--rr-text]="appearance().text"
  [style.--rr-text-muted]="appearance().textMuted"
  [style.--rr-border]="appearance().border"
  [style.--rr-shadow-card]="appearance().shadowCard"
  [style.--rr-background-overlay]="appearance().backgroundOverlay"
  [style.--rr-primary]="theme().primary"
  [style.--rr-primary-dark]="theme().primaryDark"
  [style.--rr-primary-soft]="theme().primarySoft"
>
  <ion-router-outlet></ion-router-outlet>

  @if (launchScreenVisible()) {
    <section
      class="launch-screen"
      [class.launch-screen--leaving]="launchState() === 'leaving'"
      aria-label="Loading Rave Route"
      aria-live="polite"
      role="status"
    >
      <div class="launch-screen__backdrop" aria-hidden="true"></div>
      <div class="launch-screen__content">
        <span class="launch-screen__mark" aria-hidden="true">RR</span>
        <ion-spinner aria-label="Loading your festival route" name="crescent"></ion-spinner>
      </div>
    </section>
  }
</ion-app>
